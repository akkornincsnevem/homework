hibernate.connection.driver_class=org.postgresql.Driver
hibernate.connection.url=jdbc:postgresql://localhost:5432/food
hibernate.connection.username=oeuser
hibernate.connection.password=password
hibernate.default_schema=public
# PostgreSQL dialektus
hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# SQL lekérdezések megjelenítése a konzolon
hibernate.show_sql=true
hibernate.format_sql=true
# Cache beállítások (ha nincs szükség gyorsítótárra)
hibernate.cache.use_second_level_cache=false
hibernate.cache.use_query_cache=false
hibernate.mapping.default-access=field

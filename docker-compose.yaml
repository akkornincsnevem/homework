services:
  postgres:
    container_name: postgres
    image: postgres:17.5
    hostname: postgis
    environment:
      - 'POSTGRES_PASSWORD=password'
      - 'POSTGRES_USER=oeuser'
    ports:
      - "5432:5432"
    volumes:
      - pg_volumeOE:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - oe-network


networks:
  oe-network:
    driver: bridge

volumes:
  pg_volumeOE:
